<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTegg - Page 2</title>
  <style>
    :root {
      --bg: #090909;
      --text: #ffffff;
      --slot-bg: rgba(73, 73, 73, 0.92);
      --slot-border: rgba(255, 255, 255, 0.14);
      --slot-radius: 18px;
      --slot-shadow: 0 22px 45px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none; /* Crucial: clicks "fall through" this layer */
      z-index: 2;
    }

    .video-slot, 
    .button-link, 
    .close-button {
      pointer-events: auto; /* These items can be clicked again */
    }

    .frame {
      position: relative;
      width: 100vw;
      max-width: 100vw;
      height: auto; /* Changed from min-height for better ratio stability */
      aspect-ratio: 1366 / 1595.39;
      background: url("./page2.svg") center top / 100% 100% no-repeat;
      overflow: hidden;
      isolation: isolate;
      z-index: 1;
    }

    

    .close-button {
      position: fixed;
      top: 1.6%;
      left: 1.8%;
      z-index: 100;
      width: clamp(34px, 3vw, 44px);
      height: clamp(34px, 3vw, 44px);
      border: 0;
      border-radius: 999px;
      background: #000;
      color: #4bf94b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    .close-button:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
    }

    .video-slot {
      position: absolute;
      border-radius: var(--slot-radius);
      border: 1px solid var(--slot-border);
      background: var(--slot-bg);
      box-shadow: var(--slot-shadow);
      overflow: hidden;
      z-index: 10;
      pointer-events: auto;
    }

    .video-player {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
      background: #000;
      cursor: pointer;
    }

    .video-player:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
    }

    .video-player:fullscreen {
      width: 100vw;
      height: 100vh;
      background: #000;
      object-fit: contain;
      border-radius: 0;
    }

    .video-slot--top {
      left: 25.7%;
      top: 9.9%;
      width: 48.6%;
      height: 23.4%;
      z-index: 100;
    }

    .video-slot--left {
      left: 25.95%;
      top: 53.02%;
      width: 22.9%;
      height: 34.87%;
    }

    .video-slot--right {
      left: 51.14%;
      top: 53.02%;
      width: 22.9%;
      height: 34.87%;
    }

    .button-link {
      position: absolute;
      display: block;
      border-radius: 999px;
      text-indent: -9999px;
      overflow: hidden;
      outline: none;
      z-index: 100;
      pointer-events: auto;
    }

    .button-link:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
    }

    .button-link--download {
      left: 35.72%;
      top: 35.3%;
      width: 28.7%;
      height: 4.25%;
    }

    .button-link--collection {
      left: 34.86%;
      top: 41.73%;
      width: 30.9%;
      height: 4.3%;
    }

    .button-link--beta {
      left: 35.72%;
      top: 91.2%;
      width: 28.7%;
      height: 4.25%;
    }

    @media (max-width: 900px) {
      .page {
        padding: 10px;
        overflow: hidden;
      }

      .frame {
        width: calc((100vw - 20px) * 1.86);
        max-width: none;
        min-height: auto;
        flex: 0 0 auto;
      }

      .video-slot {
        border-radius: 12px;
      }

      .close-button {
        pointer-events: auto;
        top: max(10px, env(safe-area-inset-top));
        left: max(10px, env(safe-area-inset-left));
      }
    }

    @media (max-width: 640px) {
      .button-link--download {
        left: 31.9%;
        width: 36.2%;
      }

      .button-link--collection {
        left: 30.9%;
        width: 38.3%;
      }

      .button-link--beta {
        left: 31.9%;
        width: 36.2%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="frame" aria-label="Landing page TTegg page 2">
      <div class="overlay">
        <button class="close-button" type="button" aria-label="Fermer la video ou revenir sur Atome3D">×</button>

        <section class="video-slot video-slot--top" aria-label="Zone video 1">
          <video class="video-player" controls playsinline preload="metadata" data-fullscreen-target>
            <source src="https://cdn.shopify.com/videos/c/o/v/1744adf9d80d4fa8a3d1b0c711dc92d5.mp4" type="video/mp4">
          </video>
        </section>

        <section class="video-slot video-slot--left" aria-label="Zone video 2">
          <video class="video-player" controls playsinline preload="metadata" data-fullscreen-target>
            <source src="https://cdn.shopify.com/videos/c/o/v/22f78f20d9ba49458e22e7ba13ef9749.mp4" type="video/mp4">
          </video>
        </section>

        <section class="video-slot video-slot--right" aria-label="Zone video 3">
          <video class="video-player" controls playsinline preload="metadata" data-fullscreen-target>
            <source src="https://cdn.shopify.com/videos/c/o/v/0ecb80a2656740f88165834a48d0430d.mp4" type="video/mp4">
          </video>
        </section>

        <a
          class="button-link button-link--download"
          href="https://taap.it/DF1Aqt"
          onclick="openInStore(event)"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Telecharger Tigertag"
        >
          Télécharger Tigertag
        </a>

        <a
          class="button-link button-link--collection"
          href="https://www.atome3d.com/collections/operation-paques-2026"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Les articles de la collection de Paques"
        >
          Les articles de la collection de Paques
        </a>

        <a
          class="button-link button-link--beta"
          href="https://tigertag.io/pages/apps"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Telecharger la bêta"
        >
          Telecharger la bêta
        </a>
      </div>
    </section>
  </main>
  <script>
    const fullscreenTargets = document.querySelectorAll("[data-fullscreen-target]");
    const closeButton = document.querySelector(".close-button");

    async function openFullscreen(element) {
      if (!document.fullscreenEnabled || document.fullscreenElement === element) {
        return;
      }

      try {
        await element.requestFullscreen();
      } catch (error) {
        console.error("Impossible de passer la video en plein ecran.", error);
      }
    }

    function openInStore(event) {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isAndroid = /android/i.test(ua);
      const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;

      // --- 1. PC / DESKTOP LOGIC ---
      if (!isAndroid && !isIOS) {
        // Let the standard target="_blank" handle it on PC
        return;
      }

      // --- 2. MOBILE APP BREAKOUT ---
      event.preventDefault(); // Stop the Atome3D app's internal navigator

      if (isAndroid) {
        // Triggers the Play Store App directly
        // Using a general intent for Android to ensure it leaves the WebView
        const playStoreUrl = "https://play.google.com/store/apps/details?id=com.tigertag.app";
        window.location.href = `intent://${playStoreUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;action=android.intent.action.VIEW;end`;
      } 
      else if (isIOS) {
        // itms-apps:// triggers the Apple App Store App directly
        // Using the ID from your provided link: 6745437963
        const appStoreAppUrl = "itms-apps://apps.apple.com/app/id6745437963";
        const appStoreWebUrl = "https://apps.apple.com/fr/app/tigertag-rfid-connect/id6745437963";

        // Try to open the Store App first
        window.location.href = appStoreAppUrl;
        
        // Fallback: If it doesn't redirect in 250ms, try the web URL in Safari
        setTimeout(() => {
          window.open(appStoreWebUrl, '_system');
        }, 250);
      }
    }


  
    function openInExternalBrowser(event, url) {
    const ua = navigator.userAgent || navigator.vendor || window.opera;
    const isAndroid = /android/i.test(ua);
    const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    if (!isAndroid && !isIOS) {
      return; 
    }
    event.preventDefault();

    if (isAndroid) {
      const intentUrl = `intent://${url.replace(/^https?:\/\//, '')}#Intent;scheme=https;action=android.intent.action.VIEW;end`;
      window.location.href = intentUrl;
    } 
    else if (isIOS) {
      const newWin = window.open(url, '_system');
      if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
        window.location.href = url;
      }
    }
  }

  async function handleCloseAction() {
      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {
          console.error("Impossible de quitter le plein ecran.", error);
        }
        return;
      }

      window.location.href = "https://www.atome3d.com/?ref=nlbvwlyf&cmp_id=18311534635&adg_id=&kwd=&device=c&gad_source=1&gad_campaignid=19265984540&gbraid=0AAAAADBdoT54GjwH9qMujliUHe3qXij5Y&gclid=CjwKCAjw4efDBhATEiwAaDBpbpI-YhrNGtcvRM4NorgiudGZVJW_YDEJcUss2nHqq5SxL7f2rBP_NhoCl1gQAvD_BwE";
    }

    fullscreenTargets.forEach((element) => {
      element.addEventListener("click", () => openFullscreen(element));
      element.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openFullscreen(element);
        }
      });
    });

    closeButton.addEventListener("click", handleCloseAction);
  </script>
</body>
</html>
